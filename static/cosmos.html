<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trillion — Cosmos</title>
<style>
  :root{ --accent:#2af5ff; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#04040a; color:#dfefff;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif; -webkit-font-smoothing:antialiased; }
  #bg-canvas,#orb-canvas{ position:fixed; inset:0; width:100%; height:100%; display:block; }
  #bg-canvas{ z-index:0; }
  #orb-canvas{ z-index:1; }
  /* Front label layer */
  #labels{ position:fixed; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
  /* positioned purely by transform (see tick) so moving a label never triggers
     layout — left/top are pinned at 0 and never touched again. */
  .agent-label{ position:absolute; left:0; top:0; text-align:center; white-space:nowrap;
    opacity:0; transition:opacity .25s ease; pointer-events:none;
    will-change:transform,opacity; contain:layout style; }
  .agent-label .nm{ font-size:13px; font-weight:600; letter-spacing:.02em; color:#eaf7ff;
    text-shadow:0 0 10px rgba(0,0,0,.9); }
  .agent-label .sp{ font-size:10.5px; color:#8fb6c9; margin-top:1px; text-shadow:0 0 8px rgba(0,0,0,.9); }
  .agent-label.busy .nm{ color:#fff; }
  /* HUD */
  #hud{ position:fixed; top:14px; left:16px; z-index:3; display:flex; align-items:center; gap:10px;
    font-size:12px; color:#9fc4d6; pointer-events:none; }
  #hud .dot{ width:9px; height:9px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 12px var(--accent); transition:background .5s,box-shadow .5s; }
  #brand{ font-weight:700; letter-spacing:.06em; color:#eaf7ff; }
  #state-text{ opacity:.75; }
  #controls{ position:fixed; top:12px; right:14px; z-index:3; display:flex; gap:8px; }
  #controls button{ pointer-events:auto; background:#0c1420cc; border:1px solid #234;
    color:#9fc4d6; font-size:11px; padding:6px 10px; border-radius:20px; cursor:pointer; backdrop-filter:blur(6px); }
  #controls button:hover{ border-color:var(--accent); color:#eaf7ff; }
  #controls button.on{ border-color:var(--accent); color:var(--accent); }
  /* Dock bar (docking targets for working agents) */
  #dock{ position:fixed; bottom:78px; left:50%; transform:translateX(-50%); z-index:3;
    display:flex; gap:14px; pointer-events:none; }
  .dock-slot{ width:56px; height:56px; border-radius:14px; border:1px dashed #1d2b3a;
    display:flex; align-items:center; justify-content:center; font-size:10px; color:#4a6577;
    background:#0a121cAA; opacity:.0; transition:opacity .4s, border-color .4s; }
  .dock-slot.active{ opacity:1; border-color:currentColor; }
  /* Composer — dissolved into the void: a glowing seam, not a boxed widget */
  #composer{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%); z-index:4;
    width:min(620px,90vw); display:flex; gap:10px; align-items:flex-end;
    background:linear-gradient(180deg,#0a111900,#0a1119aa); padding:10px 14px 12px;
    border:0; border-bottom:1px solid #1b2a3866; border-radius:0;
    transition:border-color .5s ease; }
  #composer:focus-within{ border-bottom-color:var(--accent); }
  #composer::after{ content:''; position:absolute; left:50%; bottom:-1px; transform:translateX(-50%);
    width:0; height:1px; background:var(--accent); box-shadow:0 0 12px var(--accent);
    transition:width .6s cubic-bezier(.2,.8,.2,1); }
  #composer:focus-within::after{ width:100%; }
  #composer textarea{ flex:1; resize:none; background:transparent; border:0; outline:0; color:#eaf7ff;
    font-size:16px; line-height:1.5; max-height:120px; font-family:inherit; text-align:center; }
  #composer textarea::placeholder{ color:#466173; letter-spacing:.04em; }
  .cbtn{ background:transparent; border:0; color:#7fa3b8; width:34px; height:34px;
    cursor:pointer; font-size:17px; display:flex; align-items:center; justify-content:center;
    opacity:.65; transition:opacity .3s, color .3s, transform .3s; }
  .cbtn:hover{ opacity:1; color:var(--accent); transform:translateY(-2px); }
  .cbtn.listening{ color:#ffb020; opacity:1; }

  /* The cosmos speaking — words surface out of the dark, lit by the orb */
  #subtitle{ position:fixed; left:50%; bottom:132px; transform:translateX(-50%); z-index:3;
    width:min(760px,90vw); text-align:center; font-size:19px; line-height:1.65;
    font-weight:300; letter-spacing:.012em; color:#dff2fb;
    pointer-events:none; min-height:1.6em; }
  #subtitle .w{ display:inline-block; opacity:0; filter:blur(6px); transform:translateY(6px);
    animation:surface .55s cubic-bezier(.2,.8,.2,1) forwards;
    /* glow rides the live voice level (--say, set each frame) */
    text-shadow:0 0 calc(10px + var(--say,0) * 26px) var(--accent),
                0 0 34px rgba(0,0,0,.95); }
  @keyframes surface{ to{ opacity:1; filter:blur(0); transform:translateY(0); } }
  #subtitle.you{ font-size:15px; color:#8fb6c9; font-weight:400; letter-spacing:.05em; }
  #subtitle.you .w{ text-shadow:0 0 18px rgba(0,0,0,.9); }
  @media (prefers-reduced-motion: reduce){
    #subtitle .w{ animation:none; opacity:1; filter:none; transform:none; }
  }
  @media (max-width:760px){ #labels,#dock{ display:none; }
    #subtitle{ bottom:118px; font-size:17px; } }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="orb-canvas"></canvas>
<div id="labels"></div>
<div id="hud"><span class="dot" id="hud-dot"></span><span id="brand">TRILLION</span><span id="state-text">idle</span></div>
<div id="controls">
  <button id="perf-btn" title="Performance mode">perf</button>
</div>
<div id="dock"></div>
<div id="subtitle"></div>
<div id="composer">
  <textarea id="input" rows="1" placeholder="Talk to Trillion…"></textarea>
  <button class="cbtn" id="mic-btn" title="Voice">🎤</button>
  <button class="cbtn" id="send-btn" title="Send">➤</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════════════════
   TRILLION · COSMOS — a living cosmic interface
   Layers:  bg-canvas (nebula+network)  ·  orb-canvas (orb+constellation)  ·  #labels
   Rule:    nothing snaps. Everything eases toward a target every frame.
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── token bootstrap (so /chat works from here too; inert without a token) ── */
let TOKEN = '';
(function(){
  try{
    const u = new URL(location.href); const q = u.searchParams.get('token');
    if(q){ localStorage.setItem('trillion_token', q); u.searchParams.delete('token'); history.replaceState({},'',u.toString()); }
    TOKEN = localStorage.getItem('trillion_token') || '';
    const _f = window.fetch;
    window.fetch = (url,opt)=>{ opt=opt||{}; const h={}; if(TOKEN) h.Authorization='Bearer '+TOKEN;
      opt.headers=Object.assign({},opt.headers,h); return _f(url,opt); };
  }catch(e){}
})();

const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const IS_MOBILE = Math.min(innerWidth,innerHeight) < 760;
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));

/* GPU simplex noise (Ashima, public domain) — shared by orb + sky shaders. */
const NOISE_GLSL = `
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0); const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.0-g; vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+C.yyy; vec3 x3=x0-D.yyy; i=mod289(i);
  vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=0.142857142857; vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z); vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy; vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0; vec4 s1=floor(b1)*2.0+1.0; vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0); m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}`;

const clock = new THREE.Clock();
let running = true;

/* ═══════════════════════ TIER 3 — states (targets the orb eases toward) ═══ */
const STATES = {
  idle:      { core:[0.05,0.35,0.42], rim:[0.16,0.85,0.95], bright:0.72, amp:0.10, churn:0.18, glow:0.34, halo:1.00, spin:0.20, size:1.00, rings:0.0 },
  listening: { core:[0.55,0.32,0.04], rim:[1.00,0.72,0.20], bright:1.05, amp:0.16, churn:0.30, glow:0.62, halo:1.35, spin:0.30, size:1.05, rings:0.0 },
  processing:{ core:[0.10,0.10,0.34], rim:[0.55,0.35,0.95], bright:0.66, amp:0.20, churn:0.85, glow:0.52, halo:1.10, spin:0.55, size:1.00, rings:1.0 },
  speaking:  { core:[0.06,0.40,0.48], rim:[0.20,0.95,1.00], bright:1.15, amp:0.30, churn:0.55, glow:0.70, halo:1.30, spin:0.45, size:1.06, rings:0.0 },
  error:     { core:[0.40,0.05,0.06], rim:[1.00,0.20,0.22], bright:0.85, amp:0.05, churn:0.05, glow:0.40, halo:1.05, spin:0.02, size:0.98, rings:0.0 },
};
let stateName = 'idle';
const cur = JSON.parse(JSON.stringify(STATES.idle));   // eased live values
function setState(name){
  if(!STATES[name]) return;
  stateName = name;
  document.getElementById('state-text').textContent = name;
  const c = STATES[name].rim;
  const hex = '#'+c.map(v=>('0'+Math.round(clamp(v,0,1)*255).toString(16)).slice(-2)).join('');
  document.documentElement.style.setProperty('--accent', hex);
  document.getElementById('hud-dot').style.background = hex;
  document.getElementById('hud-dot').style.boxShadow = '0 0 12px '+hex;
}

/* ═══════════════════════ TIER 3 — audio (real analyser + synthetic) ═══════ */
const audio = {
  ctx:null, analyser:null, data:null, el:null, hasAnalyser:false, realLevel:0,
  loud:0, bass:0,          // asymmetrically-smoothed levels the orb reads
  _ctx(){ if(!this.ctx) this.ctx = new (window.AudioContext||window.webkitAudioContext)();
    if(this.ctx.state==='suspended') this.ctx.resume(); return this.ctx; },
  attach(mediaEl){         // tap the PLAYBACK element for levels — MUST also reach the speakers
    try{
      const ctx=this._ctx();
      // createMediaElementSource is one-shot per element: only wire it up once, or a
      // repeat call throws AND (worse) leaves the element routed to a dead-end = silent.
      if(this.el!==mediaEl){
        const src=ctx.createMediaElementSource(mediaEl);
        this.analyser=ctx.createAnalyser(); this.analyser.fftSize=256;
        this.data=new Uint8Array(this.analyser.frequencyBinCount);
        src.connect(this.analyser);          // parallel tap for levels …
        src.connect(ctx.destination);        // … AND to the speakers so it's audible
        this.el=mediaEl; this.hasAnalyser=true;
      }
    }catch(e){ /* capture unsupported → element still plays natively; use synthetic visuals */ }
  },
  attachStream(stream){    // microphone path — separate context, NEVER to destination (feedback)
    try{
      const c=new (window.AudioContext||window.webkitAudioContext)();
      const src=c.createMediaStreamSource(stream);
      this.micCtx=c; this.analyser=c.createAnalyser(); this.analyser.fftSize=256;
      this.data=new Uint8Array(this.analyser.frequencyBinCount); src.connect(this.analyser); this.hasAnalyser=true;
    }catch(e){}
  },
  read(t){
    let loud=0, bass=0, real=0;
    if(this.hasAnalyser && this.analyser){
      this.analyser.getByteFrequencyData(this.data);
      let s=0; for(let i=0;i<this.data.length;i++) s+=this.data[i];
      real = s/(this.data.length*255);
      let b=0; for(let i=0;i<8;i++) b+=this.data[i]; bass=b/(8*255);
      loud = real;
    }
    // Use real levels only while audio is actually flowing; otherwise a synthetic
    // cadence keeps the orb alive. (No permanent disable — it re-engages each time.)
    this.realLevel = lerp(this.realLevel, real, 0.3);
    if(this.realLevel < 0.01){
      const drive = stateName==='speaking'?1.0 : stateName==='listening'?0.5 : stateName==='processing'?0.35:0.12;
      loud = drive*(0.35 + 0.35*Math.abs(Math.sin(t*6.1)) + 0.2*Math.abs(Math.sin(t*11.3+1.0)));
      bass = drive*(0.3 + 0.3*Math.abs(Math.sin(t*3.2)));
    }
    this.loud = loud>this.loud ? lerp(this.loud,loud,0.6) : lerp(this.loud,loud,0.08);
    this.bass = bass>this.bass ? lerp(this.bass,bass,0.6) : lerp(this.bass,bass,0.07);
  }
};

/* ═══════════════════════ ORB LAYER (renderer, scene, camera) ══════════════ */
const orbCanvas = document.getElementById('orb-canvas');
const orbRenderer = new THREE.WebGLRenderer({ canvas:orbCanvas, alpha:true, antialias:true });
orbRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
orbRenderer.setClearColor(0x000000,0);
const orbScene = new THREE.Scene();
const orbCam = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
orbCam.position.set(0,0,5.2);

/* ── TIER 1 — the orb: displaced wireframe icosahedron + fresnel + glow shell ─ */
const orbUniforms = {
  uTime:{value:0}, uAmp:{value:0.1}, uChurn:{value:0.2}, uLoud:{value:0}, uBass:{value:0},
  uColorCore:{value:new THREE.Color(0.05,0.35,0.42)}, uColorRim:{value:new THREE.Color(0.16,0.85,0.95)},
  uBright:{value:0.72}, uOpacity:{value:1.0},
};
const orbMat = new THREE.ShaderMaterial({
  uniforms:orbUniforms, wireframe:true, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
  vertexShader: NOISE_GLSL + `
    uniform float uTime,uAmp,uChurn,uLoud,uBass;
    varying float vFres; varying float vDisp;
    void main(){
      vec3 p=position;
      float n = snoise(normal*1.6 + uTime*uChurn);
      float n2= snoise(normal*3.2 - uTime*uChurn*0.7)*0.5;
      float disp = (n+n2)*uAmp + uBass*0.35 + uLoud*0.15;
      vDisp = disp;
      p += normal*disp;
      vec4 mv = modelViewMatrix*vec4(p,1.0);
      vec3 nrm = normalize(normalMatrix*normal);
      vec3 vd = normalize(-mv.xyz);
      vFres = pow(1.0-abs(dot(vd,nrm)),2.0);
      gl_Position = projectionMatrix*mv;
    }`,
  fragmentShader:`
    uniform vec3 uColorCore,uColorRim; uniform float uBright,uOpacity;
    varying float vFres; varying float vDisp;
    void main(){
      vec3 col = mix(uColorCore,uColorRim, clamp(vFres+0.18,0.0,1.0));
      col += vDisp*0.35;
      float a = (0.30 + vFres*0.95)*uOpacity;
      gl_FragColor = vec4(col*uBright, a);
    }`
});
const orb = new THREE.Mesh(new THREE.IcosahedronGeometry(1.15, 6), orbMat);
orbScene.add(orb);

const glowUniforms = { uColor:{value:new THREE.Color(0.16,0.85,0.95)}, uInt:{value:1.0} };
const glowShell = new THREE.Mesh(
  new THREE.SphereGeometry(1.7, 40, 40),
  new THREE.ShaderMaterial({
    uniforms:glowUniforms, transparent:true, side:THREE.BackSide, depthWrite:false, blending:THREE.AdditiveBlending,
    vertexShader:`varying float vF; void main(){ vec4 mv=modelViewMatrix*vec4(position,1.0);
      vec3 n=normalize(normalMatrix*normal); vec3 vd=normalize(-mv.xyz);
      vF=pow(1.0-abs(dot(vd,n)),3.0); gl_Position=projectionMatrix*mv; }`,
    fragmentShader:`uniform vec3 uColor; uniform float uInt; varying float vF;
      void main(){ gl_FragColor=vec4(uColor*uInt, vF*0.9*uInt); }`
  })
);
orbScene.add(glowShell);

/* ── TIER 5 — processing rings (the "helix") ──────────────────────────────── */
const ringGroup = new THREE.Group(); orbScene.add(ringGroup);
const rings = [];
for(let i=0;i<4;i++){
  const m = new THREE.Mesh(
    new THREE.TorusGeometry(1.5 + i*0.22, 0.012, 8, 140),
    new THREE.MeshBasicMaterial({ color:0x2af5ff, transparent:true, opacity:0, blending:THREE.AdditiveBlending, depthWrite:false })
  );
  m.rotation.x = Math.PI*0.5 + (i-1.5)*0.4;
  m.rotation.y = i*0.6;
  m.userData = { spin:(i%2?1:-1)*(0.3+i*0.12), phase:i*1.7 };
  rings.push(m); ringGroup.add(m);
}
let ringsEase = 0;

/* pulse waves (ripple outward while thinking) */
const waves = [];
function spawnWave(){
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(1.25, 24, 24),
    new THREE.MeshBasicMaterial({ color:0x7a5cff, transparent:true, opacity:0.25, blending:THREE.AdditiveBlending,
      side:THREE.BackSide, depthWrite:false, wireframe:true })
  );
  m.userData={ t:0 }; waves.push(m); orbScene.add(m);
}
let waveTimer = 0;

/* ═══════════════════════ BACKGROUND LAYER (own renderer) ══════════════════ */
const bgCanvas = document.getElementById('bg-canvas');
const bgRenderer = new THREE.WebGLRenderer({ canvas:bgCanvas, antialias:false });
let perfMode = false;
// The background is a full-screen noise shader — by far the most expensive pass.
// It drifts slowly, so rendering it below device resolution is imperceptible but
// roughly halves fragment cost on a HiDPI screen.
function bgPixelRatio(){ return perfMode ? Math.min(devicePixelRatio,1)*0.5 : Math.min(devicePixelRatio,1.0); }
bgRenderer.setPixelRatio(bgPixelRatio());
bgRenderer.autoClear = false;

/* — TIER 2a: the sky (fullscreen procedural shader on an ortho quad) — */
const skyScene = new THREE.Scene();
const skyCam = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const skyUniforms = {
  uRes:{value:new THREE.Vector2(innerWidth,innerHeight)}, uTime:{value:0}, uFade:{value:0},
  uGlowColor:{value:new THREE.Color(0.16,0.85,0.95)}, uGlow:{value:0.34},
};
const skyQuad = new THREE.Mesh(new THREE.PlaneGeometry(2,2), new THREE.ShaderMaterial({
  uniforms:skyUniforms, depthWrite:false,
  vertexShader:`void main(){ gl_Position=vec4(position,1.0); }`,
  fragmentShader: NOISE_GLSL + `
    uniform vec2 uRes; uniform float uTime,uFade,uGlow; uniform vec3 uGlowColor;
    // 3 octaves, not 5: this runs per-pixel across three nebula layers, so each
    // extra octave costs a full-screen noise evaluation. At this scale the top
    // two octaves are visually indistinguishable and cost ~40% of the frame.
    float fbm(vec3 p){ float a=0.5,f=0.0; for(int i=0;i<3;i++){ f+=a*snoise(p); p*=2.02; a*=0.5;} return f; }
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float starLayer(vec2 uv,float density,float size,float tw){
      vec2 g=uv*density; vec2 id=floor(g); vec2 f=fract(g); float h=hash(id);
      if(h<0.965) return 0.0;
      vec2 pos=vec2(hash(id+1.3),hash(id+2.7));
      float d=length(f-pos); float b=smoothstep(size,0.0,d);
      return b*(0.5+0.5*sin(uTime*tw + h*6.28));
    }
    void main(){
      vec2 uv=gl_FragCoord.xy/uRes; vec2 p=(uv-0.5); p.x*=uRes.x/uRes.y;
      float r=length(p);
      vec3 col=vec3(0.015,0.02,0.035);
      col += vec3(0.02,0.035,0.055)*smoothstep(0.95,0.0,r);
      float n1=fbm(vec3(p*1.5+vec2(uTime*0.010,0.0), uTime*0.02));
      float n2=fbm(vec3(p*2.3-vec2(0.0,uTime*0.014), 5.0+uTime*0.01));
      float n3=fbm(vec3(p*1.05+vec2(-uTime*0.008,uTime*0.006), 9.0));
      col += vec3(0.03,0.20,0.15)*smoothstep(0.15,0.9,n1)*0.45;
      col += vec3(0.22,0.03,0.20)*smoothstep(0.30,0.95,n2)*0.24;
      col += vec3(0.04,0.09,0.28)*smoothstep(0.22,0.9,n3)*0.34;
      float aspect=uRes.x/uRes.y;
      col += vec3(0.85,0.92,1.0)*starLayer(vec2(uv.x*aspect,uv.y),120.0,0.055,3.0);
      col += vec3(0.95,0.97,1.0)*starLayer(vec2(uv.x*aspect,uv.y)+7.0,55.0,0.09,1.6)*1.5;

const inputEl=document.getElementById('input'), subtitleEl=document.getElementById('subtitle');
/* Render speech word-by-word so streaming text *surfaces* instead of the whole
   line re-rendering (which flickers and kills the animation). Only the newly
   arrived words get appended; existing ones are left alone. */
let _subWords = [], _subKind = '';
function showSub(t, kind){
  kind = kind || 'trillion';
  const text = (t || '').trim();
  if (kind !== _subKind || !text) {          // speaker changed, or cleared
    subtitleEl.innerHTML = ''; _subWords = []; _subKind = kind;
    subtitleEl.classList.toggle('you', kind === 'you');
    if (!text) return;
  }
  const words = text.split(/\s+/).filter(Boolean);
  // Streaming rewrites the tail (partial word) — drop the last rendered word
  // when it's no longer a prefix match, so it re-surfaces complete.
  if (_subWords.length && words.length >= _subWords.length) {
    const i = _subWords.length - 1;
    if (_subWords[i] !== words[i] && subtitleEl.lastElementChild) {
      subtitleEl.removeChild(subtitleEl.lastElementChild); _subWords.pop();
    }
  } else if (words.length < _subWords.length) {
    subtitleEl.innerHTML = ''; _subWords = [];
  }
  for (let i = _subWords.length; i < words.length; i++) {
    const s = document.createElement('span');
    s.className = 'w'; s.textContent = words[i];
    s.style.animationDelay = Math.min((i - _subWords.length) * 45, 400) + 'ms';
    subtitleEl.appendChild(s);
    subtitleEl.appendChild(document.createTextNode(' '));
    _subWords.push(words[i]);
  }
}
inputEl.addEventListener('input',()=>{ inputEl.style.height='auto'; inputEl.style.height=Math.min(inputEl.scrollHeight,120)+'px'; });
inputEl.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendChat(); }});

async function sendChat(){
  const text=inputEl.value.trim(); if(!text) return;
  inputEl.value=''; inputEl.style.height='auto';
  realEvents=true; setState('processing');
  showSub(text, 'you');            // your words surface first, then dissolve
  setTimeout(()=>{ if(stateName==='processing') showSub(''); }, 1600);
  stopSpeech();                    // barge-in: a new turn cancels the old voice
  let reply='', lastTurn=null, spoke=false;
  try{
    const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
    if(r.status===401){ setState('error'); showSub('Not signed in — open with your ?token= link.'); return; }
    if(!r.ok){ setState('error'); showSub('Server error ('+r.status+').'); return; }
    const rd=r.body.getReader(), dec=new TextDecoder(); let buf='';
    setState('speaking');
    outer: while(true){
      const {done,value}=await rd.read(); if(done) break;
      buf+=dec.decode(value,{stream:true}); const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){ if(!line.startsWith('data: ')) continue;
        const p=line.slice(6); if(p==='[DONE]') break outer;
        try{ const o=JSON.parse(p);
          if(o.tool){ const slug=String(o.tool).replace(/^dispatch_to_/,''); const a=agents.find(x=>x.data.id==='factory:'+slug||x.data.id===slug);
            if(a){ dispatch(a.data.id); setWorking(a.data.id,true); setTimeout(()=>setWorking(a.data.id,false),4000);} }
          if(o.signoff){ setState('idle'); break outer; }
          if(o.turn_id){ lastTurn=o.turn_id; }
          if(o.type==='speak_segment'){ onSpeakSegment(o); spoke = true; continue; }
          if(o.chunk!=null){ reply+=o.chunk; showSub(reply); }
        }catch(e){}
      }
    }
  }catch(e){ setState('error'); showSub('Connection error.'); return; }
  // Only fall back to the whole-reply render when nothing was spoken piecewise.
  if(!spoke){ if(lastTurn) playTTS(lastTurn); else setState('idle'); }
}

/* prime the AudioContext on the first real user gesture so playback isn't
   blocked by the browser autoplay policy. */
let audioPrimed=false;
function primeAudio(){ if(audioPrimed) return; audioPrimed=true; try{ audio._ctx(); }catch(e){} }

/* ── streaming speech ────────────────────────────────────────────────────────
   Waiting for the whole reply before speaking meant 5-10s of silence: TTFB +
   full stream + one big TTS render. Instead each finished sentence is sent to
   /speak the moment it lands, so audio starts while the rest is still arriving.
   Fetches run in parallel (queue of promises) but play strictly in order.     */
let audioQueue = [], playing = false, ttsOn = true;
let activeBase = null, lastWasFinal = false, segAbort = null;
const audioCtxEl = new Audio();          // one element, reused: iOS-friendly

/* Server emits one speak_segment per sentence (see trillion/segments.py), so
   sentence splitting and the is_final flag live in one tested place instead of
   being re-derived in each client. */
function onSpeakSegment(msg){
  if (!ttsOn) return;
  if (activeBase === null && audioQueue.length === 0 && !playing){
    activeBase = msg.base_turn_id;
    setState('speaking');
  } else if (msg.base_turn_id !== activeBase){
    return;                              // stale segment from an interrupted turn
  }
  audioQueue.push(msg);
  pumpQueue();
}

function pumpQueue(){
  if (playing || audioQueue.length === 0) return;
  const seg = audioQueue.shift();
  lastWasFinal = !!seg.is_final;
  playing = true;
  playSegment(seg.turn_id).catch(e => {
    if (!(e && e.name === 'AbortError')) onSegmentEnded();
  });
}

async function playSegment(turnId){
  segAbort = new AbortController();
  const url = '/api/tts/' + encodeURIComponent(turnId) + (TOKEN ? ('?token=' + encodeURIComponent(TOKEN)) : '');
  const r = await fetch(url, { signal: segAbort.signal });
  if (!r.ok) throw new Error('tts ' + r.status);
  const blobUrl = URL.createObjectURL(await r.blob());
  audioCtxEl.src = blobUrl;
  try{ audio.attach(audioCtxEl); if(audio.ctx&&audio.ctx.state==='suspended') audio.ctx.resume(); }catch(e){}
  audioCtxEl.onended = audioCtxEl.onerror = () => { URL.revokeObjectURL(blobUrl); onSegmentEnded(); };
  await audioCtxEl.play().catch(()=>{});
}

function onSegmentEnded(){
  playing = false; segAbort = null;
  if (audioQueue.length > 0){ pumpQueue(); return; }
  if (lastWasFinal){
    activeBase = null; lastWasFinal = false;
    setState('idle'); showSub('');
  }
  // else: drained but more segments still arriving — stay in 'speaking'
}

function stopSpeech(){
  audioQueue.length = 0; playing = false;
  activeBase = null; lastWasFinal = false;
  if (segAbort){ try{ segAbort.abort(); }catch(e){} segAbort = null; }
  try{ audioCtxEl.pause(); audioCtxEl.currentTime = 0; }catch(e){}
  audioCtxEl.onended = null;
}

/* legacy whole-reply path, still used when no sentence ever completed */
let ttsEl=null;
function playTTS(turnId){
  setState('speaking');
  const url='/api/tts/'+turnId+(TOKEN?('?token='+encodeURIComponent(TOKEN)):'');
  if(!ttsEl){ ttsEl=new Audio(); ttsEl.crossOrigin='anonymous'; }
  ttsEl.src=url;
  try{ audio.attach(ttsEl); if(audio.ctx&&audio.ctx.state==='suspended') audio.ctx.resume(); }catch(e){}
  ttsEl.onended=()=>{ setState('idle'); showSub(''); };
  ttsEl.onerror=()=>{ setState('idle'); };
  ttsEl.play().catch(()=>{ setState('idle'); });   // if blocked, the reply text still shows
}

/* ═══════════════════════ THE ONE ANIMATION LOOP ═══════════════════════════ */
let bgFrame=0, _fpsAcc=0, _fpsFrames=0;
function tick(){
  if(!running) return;
  const dt=Math.min(clock.getDelta(),0.05); const t=clock.elapsedTime;
  demoStep(dt);
  audio.read(t);

  /* ease live orb values toward the current state (nothing snaps) */
  const S=STATES[stateName], k=0.05;
  cur.bright=lerp(cur.bright,S.bright,k); cur.amp=lerp(cur.amp,S.amp,k); cur.churn=lerp(cur.churn,S.churn,k);
  cur.glow=lerp(cur.glow,S.glow,k); cur.halo=lerp(cur.halo,S.halo,k); cur.spin=lerp(cur.spin,S.spin,k);
  cur.size=lerp(cur.size,S.size,k); cur.rings=lerp(cur.rings,S.rings,0.04);
  for(let i=0;i<3;i++){ cur.core[i]=lerp(cur.core[i],S.core[i],k); cur.rim[i]=lerp(cur.rim[i],S.rim[i],k); }

  /* orb uniforms + motion */
  orbUniforms.uTime.value=t; orbUniforms.uAmp.value=cur.amp; orbUniforms.uChurn.value=cur.churn;
  orbUniforms.uLoud.value=audio.loud; orbUniforms.uBass.value=audio.bass;
  orbUniforms.uColorCore.value.setRGB(cur.core[0],cur.core[1],cur.core[2]);
  orbUniforms.uColorRim.value.setRGB(cur.rim[0],cur.rim[1],cur.rim[2]);
  orbUniforms.uBright.value=cur.bright*(1.0+audio.loud*0.4);
  const pulse=1.0+audio.loud*0.10*(stateName==='speaking'?1.5:0.6)+Math.sin(t*1.4)*0.012;
  orb.scale.setScalar(cur.size*pulse); glowShell.scale.setScalar(cur.size*pulse*1.02);
  if(!REDUCED){ orb.rotation.y+=dt*cur.spin; orb.rotation.x+=dt*cur.spin*0.25; }
  glowShell.rotation.copy(orb.rotation);
  glowUniforms.uColor.value.setRGB(cur.rim[0],cur.rim[1],cur.rim[2]);
  glowUniforms.uInt.value=cur.halo*(0.8+audio.loud*0.5);

  /* processing rings */
  ringsEase=lerp(ringsEase,cur.rings,0.05);
  const ringCol=new THREE.Color().setRGB(lerp(0.16,0.5,ringsEase*0.0)+0,0,0);
  rings.forEach((m,i)=>{
    if(!REDUCED) m.rotation.z+=dt*m.userData.spin*(0.5+ringsEase);
    m.material.opacity=ringsEase*(0.35+0.35*Math.sin(t*2.0+m.userData.phase));
    // colour drifts teal → purple as thinking deepens
    m.material.color.setRGB(lerp(0.16,0.55,ringsEase), lerp(0.85,0.3,ringsEase), lerp(0.95,0.95,1.0));
  });
  ringGroup.scale.setScalar(cur.size);
  /* pulse waves while thinking */
  if(stateName==='processing'){ waveTimer-=dt; if(waveTimer<=0){ spawnWave(); waveTimer=1.6; } }
  for(let i=waves.length-1;i>=0;i--){ const w=waves[i]; w.userData.t+=dt; const p=w.userData.t/2.2;
    w.scale.setScalar(1.0+p*2.2); w.material.opacity=0.25*(1.0-p);
    if(p>=1){ orbScene.remove(w); w.geometry.dispose(); w.material.dispose(); waves.splice(i,1); } }

  /* background glow tracks orb + brightens on speaking/processing */
  /* speech glow rides the live level, so the words pulse with the voice */
  subtitleEl.style.setProperty('--say', (stateName==='speaking' ? audio.loud : audio.loud*0.25).toFixed(3));

  skyUniforms.uTime.value=t; skyUniforms.uGlowColor.value.setRGB(cur.rim[0],cur.rim[1],cur.rim[2]);
  skyUniforms.uGlow.value=lerp(skyUniforms.uGlow.value, cur.glow*(0.7+audio.loud*0.5), 0.06);
  skyUniforms.uFade.value=lerp(skyUniforms.uFade.value,1.0,0.02);
  if(!REDUCED){ netGroup.rotation.y+=dt*0.012; netGroup.rotation.x=Math.sin(t*0.05)*0.05;
    netCam.position.x=Math.sin(t*0.05)*1.5; netCam.position.y=Math.cos(t*0.04)*1.0; netCam.lookAt(0,0,0); }

  /* constellation: position sprites, track labels, flares, docking */
  for(const a of agents){
    const wp=agentWorldPos(a,t); a.pos.copy(wp);
    // docking target overrides orbit when working & a panel exists
    let target=wp;
    if(a.working && a.dock){
      // getBoundingClientRect forces layout; the dock slot doesn't move, so
      // resolve it once per docking rather than every frame.
      if(!a._dockPos){
        const rc=a.dock.getBoundingClientRect();
        if(rc.width) a._dockPos=screenToWorld(rc.left+rc.width/2, rc.top+rc.height/2);
      }
      if(a._dockPos) target=a._dockPos;
      a.dockAmt=lerp(a.dockAmt, 1, 0.12);          // snappy in
    } else { a.dockAmt=lerp(a.dockAmt, 0, 0.04); a._dockPos=null; }  // graceful out
    // reuse one vector per agent instead of allocating every frame (GC churn)
    const shown=(a._shown||(a._shown=new THREE.Vector3())).copy(wp).lerp(target, a.dockAmt);
    a.sprite.position.copy(shown); a.glow.position.copy(shown);
    // flare (dispatch) + working pulse + breathing
    a.flare=lerp(a.flare,0,0.06);
    const breathe=0.5+0.5*Math.sin(t*1.3+a.breathe);
    const work=a.working?(0.5+0.5*Math.sin(t*5.0)):0;
    const sc=0.46*(1.0+a.flare*0.7+work*0.12);
    a.sprite.scale.setScalar(sc);
    a.glow.scale.setScalar(1.15*(1.0+a.flare*1.2+work*0.5)+breathe*0.12);
    a.glow.material.opacity=0.5+a.flare*0.5+work*0.4+breathe*0.15;
    // project → screen for the HTML label; depth fade & behind-orb hide
    const proj=shown.clone().project(orbCam);
    const camZ=shown.clone().applyMatrix4(orbCam.matrixWorldInverse).z;   // more negative = farther
    const behind = camZ < -orbCam.position.z;   // farther than orb centre
    const sx=(proj.x*0.5+0.5)*innerWidth, sy=(-proj.y*0.5+0.5)*innerHeight;
    const nearCentre = Math.hypot(proj.x,proj.y) < 0.14;
    let op = behind ? 0.28 : 1.0;
    if(behind && nearCentre) op=0;             // directly behind the orb → hide
    if(a.working) op=Math.max(op,0.9);
    // transform (compositor) instead of left/top (layout), and only write when
    // the value actually changed — 5 labels x 4 style writes per frame was
    // forcing layout every frame.
    const tx=Math.round(sx), ty=Math.round(sy+26);
    if(tx!==a._tx || ty!==a._ty){
      a.label.style.transform=`translate3d(${tx}px,${ty}px,0) translateX(-50%)`;
      a._tx=tx; a._ty=ty;
    }
    const z=String(1000+Math.round(camZ*10));
    if(z!==a._z){ a.label.style.zIndex=z; a._z=z; }
    if(a.working!==a._busy){ a.label.classList.toggle('busy',a.working); a._busy=a.working; }
    if(!a.revealed){ a.revealed=true; }         // reveal only after first real projection
    const o=(proj.z<1?op:0).toFixed(2);
    if(o!==a._op){ a.label.style.opacity=o; a._op=o; }
  }

  /* dispatch beams */
  for(let i=beams.length-1;i>=0;i--){ const b=beams[i]; b.t+=dt; const p=b.t/b.dur;
    const to=b.a.pos;
    // orient cylinder from orb → agent, grow out then fade (scratch vectors: no
    // per-frame allocation)
    const dir=_v1.copy(to); const len=dir.length();
    b.cyl.position.copy(_v2.copy(dir).multiplyScalar(0.5));
    b.cyl.scale.set(1,len,1); b.cyl.quaternion.setFromUnitVectors(AX_Y,_v3.copy(dir).normalize());
    const env=Math.sin(clamp(p,0,1)*Math.PI);      // peak in the middle
    b.cyl.material.opacity=env*0.8;
    // bead races out and back
    const travel=p<0.5? p*2 : (1-(p-0.5)*2);
    b.bead.position.copy(_v2.copy(dir).multiplyScalar(clamp(travel,0,1)));
    b.bead.scale.setScalar(0.35+env*0.4); b.bead.material.opacity=env;
    b.a.flare=Math.max(b.a.flare,env);
    // sonar ring at the agent, peaks mid
    b.ring.position.copy(to); b.ring.quaternion.copy(orbCam.quaternion);
    b.ring.scale.setScalar(0.3+p*2.2); b.ring.material.opacity=env*0.7;
    if(p>=1){ [b.cyl,b.bead,b.ring].forEach(m=>{orbScene.remove(m); m.geometry&&m.geometry.dispose(); m.material.dispose();}); beams.splice(i,1); }
  }
  for(let i=orbPings.length-1;i>=0;i--){ const o=orbPings[i]; o.t+=dt; const p=o.t/1.0;
    o.m.quaternion.copy(orbCam.quaternion); o.m.scale.setScalar(1+p*1.5); o.m.material.opacity=0.5*(1-p);
    if(p>=1){ orbScene.remove(o.m); o.m.geometry.dispose(); o.m.material.dispose(); orbPings.splice(i,1); } }

  /* ── render: background (optionally every other frame in perf mode) then orb ─ */
  // The orb stays at full rate; the background renders every other frame always
  // (every 3rd in perf mode). It drifts slowly enough that the lower rate is
  // invisible, and it is the most expensive pass by a wide margin.
  bgFrame++;
  const bgEvery = perfMode ? 3 : 2;
  if(bgFrame % bgEvery === 0){
    bgRenderer.clear();
    bgRenderer.render(skyScene, skyCam);
    bgRenderer.render(netScene, netCam);
  }
  orbRenderer.render(orbScene, orbCam);

  /* adaptive quality: if the frame budget is being missed consistently, drop to
     perf mode once rather than letting the whole scene stutter. */
  if(!perfMode && !REDUCED){
    _fpsAcc += dt; _fpsFrames++;
    if(_fpsAcc >= 2.0){
      const fps = _fpsFrames / _fpsAcc;
      if(fps < 40){ Cosmos.setPerf(true); console.info('[cosmos] low fps (' + fps.toFixed(0) + ') — perf mode on'); }
      _fpsAcc = 0; _fpsFrames = 0;
    }
  }
  requestAnimationFrame(tick);
}

/* ═══════════════════════ resize / visibility / cleanup ════════════════════ */
function onResize(){
  const w=innerWidth,h=innerHeight;
  orbRenderer.setSize(w,h); orbCam.aspect=w/h; orbCam.updateProjectionMatrix();
  bgRenderer.setSize(w,h); netCam.aspect=w/h; netCam.updateProjectionMatrix();
  skyUniforms.uRes.value.set(w*bgPixelRatio(),h*bgPixelRatio());
}
addEventListener('resize',onResize); onResize();

document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ running=false; }
  else if(!running){ running=true; clock.getDelta(); requestAnimationFrame(tick); }
});
addEventListener('pagehide',()=>{
  try{ orbRenderer.dispose(); bgRenderer.dispose(); }catch(e){}
});

/* ── go ── */
loadAgents();
setState('idle');
requestAnimationFrame(tick);
</script>
</body>
</html>
